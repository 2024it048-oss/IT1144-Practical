<!DOCTYPE html>
<html lang='en'>
<head>

	<title>Student Registration Form</title>
	<style>
		body{
			font-family:sans-serif;
			background-color:white;
		
			padding:50px;
			margin:0;
		}

	h1{
	color:#1a202c;
	font-size:1.6rem;
	margin-bottom:24px;
	}
	</style>
</head>

<body>
<h1>
<b><u>Student Registration Form</b></u>
</h1>

<form>
	<label>Full Name</label><br>
	<input type="text"placeholder="Enter your full name here"
	></input><br><br>
	
	<label>Email</label><br>
	<input type="email"placeholder="you@university.edu"></input><br><br>
	
	<label>Password</label><br>
	<input type="Password"placeholder="Minimum 8 characters"></input><br><br>
	
	<label>Age</label><br>
	<input type="Number"placeholder="Your Age"></input><br><br>
	
	<label>Phone Number</label><br>
	<input type="tel"placeholder="070 000 0000"></input><br><br>
	
	<p>Gender</p>
	<label>
	<input type="radio" name="Gender">Male</input></label><br>
	<label>
	<input type="radio" name="Gender">Female</input></label><br>
	<label>
	<input type="radio" name="Gender">Prefer not to say</input></label><br><br>
	
		
	<p>Skills</p>
	<label>
		<input type="checkbox" Name="Skills"></input>
		HTML 
	</label>
	
	<label>
		<input type="checkbox" Name="Skills"></input>
		JAVA
	</label><br><br>	
	
	<label>
		<input type="checkbox" Name="Skills"></input>
		CSS
	</label>
	
	<label>
		<input type="checkbox" Name="Skills"></input>
		Python
	</label><br><br>
	
	<label>
		<input type="checkbox" Name="Skills"></input>
		C#
	</label>
	
	<label>
		<input type="checkbox" Name="Skills"></input>
		C++ 
	</label><br><br>
	
	
	<label>Year of Study</label><br>
	<select name="Year">
		<option>2024</option>
		<option>2023</option>
		<option>2022</option>
		<option>2021</option>
		<option>2020</option>
	</select><br><br>
	
	<label>About Yourself</label>
	<textarea rows="5"placeholder="Tell us something about Yourself"></textarea><br><br><br>
	
	<button type="submit""> Submit</button>
	
</form>
</body>
